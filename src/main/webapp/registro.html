<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Briva - Crear cuenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; color: #2c2c2c; }
        header { text-align: center; padding: 30px; border-bottom: 1px solid #ddd; letter-spacing: 6px; font-size: 2rem; font-weight: bold; }
        .main { display: flex; justify-content: center; padding: 60px; }
        .container { width: 400px; }
        h2 { font-size: 1.1rem; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; }
        label { font-size: 0.85rem; display: block; margin-bottom: 6px; color: #555; }
        input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-bottom: 18px; outline: none; }
        input:focus { border-color: #2c2c2c; }
        button { width: 100%; padding: 12px; background: #2c2c2c; color: white; border: none; border-radius: 4px; font-size: 0.9rem; cursor: pointer; margin-bottom: 12px; }
        button:hover { background: #444; }
        .volver { text-align: center; font-size: 0.85rem; }
        .volver a { color: #2c2c2c; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
<header>BRIVA</header>
<div class="main">
    <div class="container">
        <h2>Crear cuenta</h2>
        <form action="RegistroServlet" method="post">
            <label>Nombre de usuario:</label>
            <input type="text" name="username" placeholder="Elige un usuario" required/>
            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="Crea una contraseña" required/>
            <label>Confirmar contraseña:</label>
            <input type="password" name="confirmar" placeholder="Repite tu contraseña" required/>
            <button type="submit">Crear cuenta</button>
        </form>
        <div class="volver">
            <a href="login.html">← Volver al inicio de sesión</a>
        </div>
    </div>
</div>
</body>
</html>
